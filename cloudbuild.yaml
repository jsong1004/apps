steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/ai-biz-6b7ec/app', '.']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/ai-biz-6b7ec/app']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'app'
      - '--image'
      - 'gcr.io/ai-biz-6b7ec/app'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--service-account'
      - '22835475779-compute@developer.gserviceaccount.com'
      - '--project'
      - 'ai-biz-6b7ec'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--port'
      - '80'

  # Ensure public (unauthenticated) invoker access so https://app-22835475779.us-central1.run.app/ and custom domain work
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'add-iam-policy-binding'
      - 'app'
      - '--region=us-central1'
      - '--project=ai-biz-6b7ec'
      - '--member=allUsers'
      - '--role=roles/run.invoker'
      - '--quiet'

images:
  - 'gcr.io/ai-biz-6b7ec/app'

options:
  logging: CLOUD_LOGGING_ONLY